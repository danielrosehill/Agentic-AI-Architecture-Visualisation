<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic AI Architecture Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Mono', 'SF Mono', 'Fira Code', monospace;
      background: #f8f9fa;
      display: flex;
      justify-content: center;
      padding: 2rem;
    }
    #diagram {
      background: #fff;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
      max-width: 1000px;
      min-height: 900px;
    }
    #diagram svg {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    #diagram svg:active { cursor: grabbing; }
    .tooltip {
      position: fixed;
      background: #1a1a2e;
      color: #fff;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.78rem;
      width: 220px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
  </style>
</head>
<body>
  <div id="diagram"></div>
  <script type="module" src="diagram.js"></script>
</body>
</html>
